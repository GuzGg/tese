# Database Configuration
#JDBC URL to connect to the MariaDB server
db.url=jdbc:mariadb://localhost:3306
# Database username
db.username=root
# Database password
db.password=root
# Database name
db.name=measurements

# Action Manager settings
# Slow Scan Period in milliseconds
am.slowScanPeriod=60000
# Fast Scan Period in milliseconds
am.fastScanPeriod=30000
# Scan Interval in milliseconds
am.scanInterval=2000

# ---> HIGH-SPEED OPTIMIZATION: Shrink slots to 30ms total <---
# Scan Time in milliseconds
am.scanTime=10
# Min Measurement Round Time in milliseconds (Allows slow Wi-Fi to catch up safely)
am.minRoundTime=2000
# Safety Time Buffer to pad measurement slots in milliseconds
am.safetyBuffer=10

# Export Flags
# Export to Database flag
exportToDbQ=true
# Export to Position Estimator flag
exportToPeQ=true

#Logs
# Logging Categories
enableInputLogs=true
enableOutputLogs=true
enableGeneralLogs=true

# Database Resilience
# Number of consecutive failures before the servlet terminates
db.maxRetries=5
# Delay between retry attempts in milliseconds
db.retryDelay=10000

#Position Estimator
pe.url=http://localhost:8080/E04/estimatePosition
pe.token=1234

#Security
#Flag to enable or disable tag whitelist
sec.whitelist=false

# Execution Tracking
log.executionComparison=true
# Directory to save the execution logs (Use forward slashes)
log.directory=C:/UWB_Logs